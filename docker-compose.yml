# Perth Airport flight board — single container (API + scrape loop)

#

#   docker compose build

#   docker compose up -d



services:

  app:

    build: .

    image: perth-airport-arrivals-and-departures:latest

    ports:

      - "${PORT:-3000}:3000"

    environment:

      DATABASE_PATH: /app/data/flights.db

      PORT: "3000"

      TZ: Australia/Perth

      SCRAPE_INTERVAL_SECONDS: ${SCRAPE_INTERVAL_SECONDS:-60}

    volumes:

      - flight-data:/app/data

    restart: unless-stopped

    entrypoint: ["/app/docker/entrypoint-app.sh"]



volumes:

  flight-data:

